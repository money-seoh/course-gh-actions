name: upper-build-go

on:
  push:
    paths:
      - ".github/workflows/upper-build-go.yml"
      - "upper/**"
  workflow_dispatch: # manual

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
        - run: go version
        - uses: actions/setup-go@v6
          with:
            go-version: '1.26'
        - run : go version
